name: Deploy Notifications

on:
  workflow_run:
    workflows: [Deploy]
    types:
      - completed

permissions:
  actions: read

jobs:
  notify:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          resp=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/jobs")
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; cancelled) echo "⛔";; *) echo "⏭️";; esac; }
          build=$(echo "$resp" | jq -r '(.jobs // [])[] | select(.name == "build") | .conclusion // "skipped"' | head -1); build=${build:-skipped}
          deploy=$(echo "$resp" | jq -r '(.jobs // [])[] | select(.name == "deploy") | .conclusion // "skipped"' | head -1); deploy=${deploy:-skipped}
          msg="Portfolio deploy: ${CONCLUSION}
          Build: $(icon "$build")
          Deploy: $(icon "$deploy")"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$msg"
